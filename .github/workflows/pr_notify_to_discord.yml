name: Discord PR Notifications

on:
  pull_request:
    types: [opened, closed, reopened, ready_for_review, converted_to_draft]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        uses: Yasser5711/Discord-PR-Notify@v1
        with:
          discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          discord_id_map_json: ${{ secrets.DISCORD_ID_MAP_JSON }}

